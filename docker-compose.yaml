services:
  db:
    image: postgres
    container_name: db
    restart: on-failure
    ports:
      - 5432:5432
    environment:
      - POSTGRES_DB=devops
      - POSTGRES_USER=devops
      - POSTGRES_PASSWORD=devops
      
  drink:
    build: .
    container_name: devops_drink
    ports:
      - 8080:8080
    environment:
      - LOGGER_LEVEL=DEBUG
    depends_on:
      - db
    cpu_count: 1
    mem_limit: 512m
    user: spring

  sonar:
    image: sonarqube:community
    ports:
      - 9000:9000
    container_name: sonar

